<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Progres Hafalan Juz 30</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { ui: ['Plus Jakarta Sans','sans-serif'], arabic: ['Amiri','serif'] },
                }
            }
        }
    </script>
    <style>
        :root {
            --bg:#0A1F14; --card:#122B1C; --elevated:#1A3A28; --border:#1E3D2B;
            --text:#F0F5F1; --muted:#8BA898; --emerald:#1DB954;
            --gold:#D4A843; --gold-light:#FFD700; --silver:#C0C0C0; --silver-light:#E8E8E8;
            --jayyid:#E8A838;
            --header-from:#0D3320; --header-via:#0A1F14; --header-to:#122B1C;
            --particle-color:#D4A843;
            --glow-gold:rgba(212,168,67,.08);
            --search-bg:var(--card); --search-border:var(--border);
            --stat-bg:linear-gradient(135deg,rgba(26,58,40,.9),rgba(18,43,28,.9));
            --sheet-from:#152E20; --sheet-to:var(--bg);
            --tile-m-bg:linear-gradient(135deg,rgba(29,185,84,.2),rgba(29,185,84,.08));
            --tile-m-border:rgba(29,185,84,.25);
            --tile-j-bg:linear-gradient(135deg,rgba(232,168,56,.2),rgba(232,168,56,.08));
            --tile-j-border:rgba(232,168,56,.25);
            --tile-e-bg:rgba(30,61,43,.3);
            --tile-e-border:rgba(30,61,43,.5);
            --overlay-bg:rgba(0,0,0,.6);
            --body-pattern-1:rgba(29,185,84,.03);
            --body-pattern-2:rgba(212,168,67,.02);
        }
        html.light {
            --bg:#F6F1E7; --card:#FFFFFF; --elevated:#EDE8DE; --border:#D5CEBD;
            --text:#1A2E22; --muted:#6B8F7B; --emerald:#0D7A35;
            --gold:#B8860B; --gold-light:#D4A843; --silver:#808080; --silver-light:#6B6B6B;
            --jayyid:#C47F1A;
            --header-from:#163D28; --header-via:#0F2E1C; --header-to:#1A4A30;
            --particle-color:rgba(255,215,0,.6);
            --glow-gold:rgba(255,215,0,.12);
            --search-bg:#FFFFFF; --search-border:#D5CEBD;
            --stat-bg:linear-gradient(135deg,rgba(255,255,255,.95),rgba(246,241,231,.95));
            --sheet-from:#FFFFFF; --sheet-to:#F6F1E7;
            --tile-m-bg:linear-gradient(135deg,rgba(13,122,53,.12),rgba(13,122,53,.05));
            --tile-m-border:rgba(13,122,53,.2);
            --tile-j-bg:linear-gradient(135deg,rgba(196,127,26,.12),rgba(196,127,26,.05));
            --tile-j-border:rgba(196,127,26,.2);
            --tile-e-bg:rgba(213,206,189,.4);
            --tile-e-border:rgba(213,206,189,.7);
            --overlay-bg:rgba(0,0,0,.35);
            --body-pattern-1:rgba(13,122,53,.02);
            --body-pattern-2:rgba(184,134,11,.015);
        }
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
        html{scroll-behavior:smooth}
        body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;padding-bottom:2rem;transition:background .4s,color .4s}
        body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(circle at 25% 25%,var(--body-pattern-1) 0%,transparent 50%),radial-gradient(circle at 75% 75%,var(--body-pattern-2) 0%,transparent 50%);background-size:60px 60px,80px 80px;pointer-events:none;z-index:0;transition:background .4s}
        #app{position:relative;z-index:1;max-width:480px;margin:0 auto}
        .header-bg{background:linear-gradient(160deg,var(--header-from) 0%,var(--header-via) 40%,var(--header-to) 100%);position:relative;overflow:hidden;padding:2rem 1.25rem 2rem;border-bottom-left-radius:1.5rem;border-bottom-right-radius:1.5rem;transition:background .4s}
        .header-bg::before{content:'';position:absolute;top:-60%;right:-30%;width:300px;height:300px;background:radial-gradient(circle,var(--glow-gold) 0%,transparent 70%);border-radius:50%;animation:headerGlow 6s ease-in-out infinite alternate}
        @keyframes headerGlow{0%{transform:translate(0,0) scale(1)}100%{transform:translate(-20px,20px) scale(1.15)}}
        .particle{position:absolute;width:3px;height:3px;background:var(--particle-color);border-radius:50%;opacity:0;animation:floatUp 5s ease-in-out infinite}
        @keyframes floatUp{0%{opacity:0;transform:translateY(20px) scale(0)}20%{opacity:.8}80%{opacity:.3}100%{opacity:0;transform:translateY(-80px) scale(1)}}
        .logo-wrap{width:52px;height:52px;margin-bottom:.75rem}
        .logo-wrap img{width:100%;height:100%;object-fit:contain;border-radius:.5rem;filter:drop-shadow(0 2px 8px rgba(0,0,0,.25))}
        .logo-fallback{width:100%;height:100%;border-radius:.5rem;background:linear-gradient(135deg,rgba(29,185,84,.15),rgba(212,168,67,.15));display:none;align-items:center;justify-content:center;font-size:1.4rem;color:var(--gold)}
        .mode-toggle{display:flex;align-items:center;gap:.5rem;position:absolute;top:1rem;right:1rem;z-index:5}
        .mode-toggle button{width:34px;height:34px;border-radius:50%;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.08);color:rgba(255,255,255,.7);display:flex;align-items:center;justify-content:center;font-size:.8rem;cursor:pointer;transition:all .25s;backdrop-filter:blur(8px)}
        .mode-toggle button:active{transform:scale(.9)}
        .mode-toggle button.active-mode{background:rgba(255,255,255,.2);color:#fff;border-color:rgba(255,255,255,.3)}
        .stat-card{background:var(--stat-bg);border:1px solid var(--border);border-radius:1rem;padding:.875rem;backdrop-filter:blur(10px);transition:transform .2s,border-color .2s,background .4s}
        .stat-card:active{transform:scale(.96)}
        .stat-card.gold-stat{border-color:rgba(212,168,67,.3)}
        html.light .stat-card.gold-stat{border-color:rgba(184,134,11,.25)}
        .stat-card.silver-stat{border-color:rgba(192,192,192,.3)}
        html.light .stat-card.silver-stat{border-color:rgba(128,128,128,.25)}
        .search-wrap{position:relative}
        .search-wrap input{width:100%;background:var(--search-bg);border:1px solid var(--search-border);border-radius:.875rem;padding:.75rem 1rem .75rem 2.75rem;color:var(--text);font-size:.9rem;font-family:inherit;outline:none;transition:border-color .2s,box-shadow .2s,background .4s,color .4s}
        .search-wrap input::placeholder{color:var(--muted)}
        .search-wrap input:focus{border-color:var(--emerald);box-shadow:0 0 0 3px rgba(29,185,84,.15)}
        html.light .search-wrap input:focus{box-shadow:0 0 0 3px rgba(13,122,53,.1)}
        .search-wrap>.search-icon{position:absolute;left:1rem;top:50%;transform:translateY(-50%);color:var(--muted);font-size:.85rem;pointer-events:none}
        .pill{padding:.5rem 1rem;border-radius:2rem;font-size:.8rem;font-weight:600;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all .25s;white-space:nowrap;font-family:inherit}
        .pill.active{background:var(--emerald);border-color:var(--emerald);color:#fff;box-shadow:0 2px 12px rgba(29,185,84,.3)}
        html.light .pill.active{box-shadow:0 2px 12px rgba(13,122,53,.2)}
        .pill:not(.active):active{background:var(--elevated)}
        .student-card{background:var(--card);border:1px solid var(--border);border-radius:1rem;padding:1rem 1rem 1rem .75rem;display:flex;align-items:center;gap:.875rem;cursor:pointer;transition:transform .2s,border-color .2s,background .4s;animation:cardIn .4s ease-out both}
        .student-card:active{transform:scale(.98)}
        .student-card:hover{border-color:var(--emerald)}
        html.light .student-card:hover{border-color:rgba(13,122,53,.3)}
        @keyframes cardIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
        .avatar{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:1rem;flex-shrink:0;color:#fff}
        .progress-track{height:6px;background:var(--elevated);border-radius:3px;overflow:hidden;margin-top:.4rem;transition:background .4s}
        .progress-fill{height:100%;border-radius:3px;transition:width .8s cubic-bezier(.22,1,.36,1);width:0}
        .gold-badge{width:40px;height:40px;border-radius:50%;background:linear-gradient(145deg,#FFD700,#DAA520,#B8860B,#DAA520,#FFD700);display:flex;align-items:center;justify-content:center;flex-shrink:0;position:relative;overflow:hidden;box-shadow:0 0 8px rgba(255,215,0,.5),0 0 20px rgba(255,215,0,.25),0 0 40px rgba(255,215,0,.1),inset 0 1px 2px rgba(255,255,255,.4)}
        .gold-badge::before{content:'';position:absolute;top:-120%;left:-120%;width:340%;height:340%;background:linear-gradient(55deg,transparent 38%,rgba(255,255,255,.35) 44%,rgba(255,255,255,.6) 50%,rgba(255,255,255,.35) 56%,transparent 62%);animation:goldSweep 2.8s ease-in-out infinite}
        @keyframes goldSweep{0%{transform:translate(-25%,-25%) rotate(30deg)}50%{transform:translate(25%,25%) rotate(30deg)}100%{transform:translate(-25%,-25%) rotate(30deg)}}
        .gold-badge i{color:#5C3D00;font-size:1rem;position:relative;z-index:1;filter:drop-shadow(0 1px 1px rgba(255,215,0,.5))}
        .gold-badge::after{content:'';position:absolute;width:4px;height:4px;background:#fff;border-radius:50%;top:4px;right:6px;animation:sparkle 2s ease-in-out infinite;z-index:2}
        @keyframes sparkle{0%,100%{opacity:0;transform:scale(0)}50%{opacity:1;transform:scale(1)}}
        .silver-badge{width:40px;height:40px;border-radius:50%;background:linear-gradient(145deg,#E8E8E8,#C0C0C0,#A0A0A0,#C0C0C0,#E8E8E8);display:flex;align-items:center;justify-content:center;flex-shrink:0;position:relative;overflow:hidden;box-shadow:0 0 6px rgba(192,192,192,.35),0 0 16px rgba(192,192,192,.15),inset 0 1px 2px rgba(255,255,255,.5)}
        .silver-badge::before{content:'';position:absolute;top:-120%;left:-120%;width:340%;height:340%;background:linear-gradient(55deg,transparent 40%,rgba(255,255,255,.25) 46%,rgba(255,255,255,.4) 50%,rgba(255,255,255,.25) 54%,transparent 60%);animation:silverSweep 4s ease-in-out infinite}
        @keyframes silverSweep{0%{transform:translate(-25%,-25%) rotate(30deg)}50%{transform:translate(25%,25%) rotate(30deg)}100%{transform:translate(-25%,-25%) rotate(30deg)}}
        .silver-badge i{color:#4A4A4A;font-size:1rem;position:relative;z-index:1}
        .sheet-overlay{position:fixed;inset:0;background:var(--overlay-bg);z-index:100;opacity:0;pointer-events:none;transition:opacity .3s;backdrop-filter:blur(4px)}
        .sheet-overlay.open{opacity:1;pointer-events:auto}
        .sheet{position:fixed;bottom:0;left:50%;transform:translateX(-50%) translateY(100%);width:100%;max-width:480px;max-height:88vh;background:linear-gradient(180deg,var(--sheet-from) 0%,var(--sheet-to) 100%);border-top-left-radius:1.5rem;border-top-right-radius:1.5rem;z-index:101;transition:transform .4s cubic-bezier(.22,1,.36,1),background .4s;overflow:hidden;display:flex;flex-direction:column}
        .sheet.open{transform:translateX(-50%) translateY(0)}
        .sheet-handle{width:36px;height:4px;background:var(--muted);border-radius:2px;margin:.75rem auto 0;flex-shrink:0;transition:background .4s}
        .sheet-body{padding:1rem 1.25rem 2rem;overflow-y:auto;flex:1;-webkit-overflow-scrolling:touch}
        .btn-close-sheet{width:32px;height:32px;border-radius:50%;border:none;background:var(--elevated);color:var(--muted);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .2s,transform .15s;flex-shrink:0}
        .btn-close-sheet:active{transform:scale(.88);background:var(--border)}
        .surah-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
        .surah-tile{aspect-ratio:1;border-radius:.625rem;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;transition:transform .15s,background .4s,border-color .4s;border:1px solid transparent}
        .surah-tile:active{transform:scale(.92)}
        .surah-tile.m-tile{background:var(--tile-m-bg);border-color:var(--tile-m-border)}
        .surah-tile.j-tile{background:var(--tile-j-bg);border-color:var(--tile-j-border)}
        .surah-tile.empty-tile{background:var(--tile-e-bg);border-color:var(--tile-e-border)}
        .surah-tile .tile-num{font-size:.55rem;color:var(--muted);margin-bottom:1px}
        .surah-tile .tile-grade{font-weight:800;font-size:.85rem;line-height:1}
        .surah-tile.m-tile .tile-grade{color:var(--emerald)}
        .surah-tile.j-tile .tile-grade{color:var(--jayyid)}
        .surah-tile.empty-tile .tile-grade{color:var(--border)}
        .surah-tile .tile-name{font-size:.48rem;color:var(--muted);margin-top:2px;text-align:center;line-height:1.1;max-width:95%;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
        .legend-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}
        .loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;padding:2rem;text-align:center}
        .loader-ring{width:56px;height:56px;border-radius:50%;border:3px solid var(--border);border-top-color:var(--emerald);animation:spin 1s linear infinite}
        @keyframes spin{to{transform:rotate(360deg)}}
        .error-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;padding:2rem;text-align:center}
        .error-box{background:var(--card);border:1px solid rgba(232,93,117,.3);border-radius:1rem;padding:2rem;max-width:340px;width:100%;transition:background .4s}
        .error-box code{background:var(--elevated);padding:.15rem .4rem;border-radius:.25rem;font-size:.8rem;color:var(--jayyid)}
        .empty-state{text-align:center;padding:3rem 1rem;color:var(--muted)}
        ::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
        @media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}}
    </style>
</head>
<body>
    <div id="app">
        <header class="header-bg">
            <div class="particle" style="left:10%;bottom:20%;animation-delay:0s"></div>
            <div class="particle" style="left:30%;bottom:10%;animation-delay:1.2s"></div>
            <div class="particle" style="left:55%;bottom:30%;animation-delay:.6s"></div>
            <div class="particle" style="left:75%;bottom:15%;animation-delay:2s"></div>
            <div class="particle" style="left:85%;bottom:25%;animation-delay:3.2s"></div>
            <div class="particle" style="left:45%;bottom:5%;animation-delay:1.8s"></div>
            <div class="mode-toggle">
                <button id="btn-dark" class="active-mode" aria-label="Mode gelap" title="Mode Gelap"><i class="fas fa-moon"></i></button>
                <button id="btn-light" aria-label="Mode terang" title="Mode Terang"><i class="fas fa-sun"></i></button>
            </div>
            <div class="logo-wrap">
                <img src="logo.png" alt="Logo Sekolah" id="school-logo" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
                <div class="logo-fallback"><i class="fas fa-mosque"></i></div>
            </div>
            <h1 class="text-xl font-extrabold tracking-tight">Progres Hafalan</h1>
            <h2 class="text-2xl font-extrabold tracking-tight mt-0.5" style="color:var(--gold-light)">Juz 30</h2>
            <p class="font-arabic text-lg mt-2" style="color:var(--muted)">مُمْتَازٌ وَجَيِّدٌ</p>
        </header>
        <div id="main-content"></div>
    </div>

    <div class="sheet-overlay" id="sheet-overlay" aria-hidden="true"></div>
    <div class="sheet" id="sheet" role="dialog" aria-modal="true" aria-label="Detail hafalan siswa">
        <div class="sheet-handle"></div>
        <div class="sheet-body" id="sheet-body"></div>
    </div>

    <script>
    var XLS_FILE = 'data.xlsx';
    var TOTAL_SURAH = 37;
    var surahNames = [
        "An-Naba'","An-Nazi'at","Abasa","At-Takwir","Al-Infitar",
        "Al-Muthaffifin","Al-Insyiqaq","Al-Buruj","At-Tariq","Al-A'la",
        "Al-Ghasyiyah","Al-Fajr","Al-Balad","Asy-Syams","Al-Lail",
        "Ad-Dhuha","Asy-Syarh","At-Tin","Al-Alaq","Al-Qadr",
        "Al-Bayyinah","Az-Zalzalah","Al-Adiyat","Al-Qari'ah","At-Takatsur",
        "Al-'Ashr","Al-Humazah","Al-Fil","Quraisy","Al-Ma'un",
        "Al-Kautsar","Al-Kafirun","An-Nasr","Al-Masad","Al-Ikhlas",
        "Al-Falaq","An-Nas"
    ];
    var avatarColors = [
        '#1DB954','#E8A838','#3B9AE1','#E85D75','#9B59B6',
        '#1ABC9C','#E67E22','#2ECC71','#E74C3C','#3498DB',
        '#F39C12','#16A085','#8E44AD','#D35400','#27AE60'
    ];
    var students = [];
    var currentFilter = 'all';
    var searchQuery = '';

    /* ====== MODE GELAP/TERANG ====== */
    var btnDark = document.getElementById('btn-dark');
    var btnLight = document.getElementById('btn-light');
    function setMode(mode) {
        if (mode === 'light') {
            document.documentElement.classList.add('light');
            btnDark.classList.remove('active-mode');
            btnLight.classList.add('active-mode');
        } else {
            document.documentElement.classList.remove('light');
            btnDark.classList.add('active-mode');
            btnLight.classList.remove('active-mode');
        }
        localStorage.setItem('theme-mode', mode);
    }
    setMode(localStorage.getItem('theme-mode') || 'dark');
    btnDark.addEventListener('click', function() { setMode('dark'); });
    btnLight.addEventListener('click', function() { setMode('light'); });

    /* ====== LOAD DATA ====== */
    function init() {
        showLoading();
        fetch(XLS_FILE)
            .then(function(resp) {
                if (!resp.ok) throw new Error('file_not_found');
                return resp.arrayBuffer();
            })
            .then(function(buffer) {
                var wb = XLSX.read(buffer, { type: 'array' });
                var ws = wb.Sheets[wb.SheetNames[0]];
                var rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });
                parseRows(rows);
                if (students.length === 0) throw new Error('empty');
                renderAll();
            })
            .catch(function(err) {
                showError(err.message);
            });
    }

    function parseRows(rows) {
        var startIdx = 0;
        if (rows.length > 0) {
            var firstRowGrades = rows[0].slice(1).map(function(c) { return String(c).trim().toUpperCase(); });
            var hasMJ = firstRowGrades.some(function(v) { return v === 'M' || v === 'J'; });
            if (!hasMJ) startIdx = 1;
        }
        students = [];
        for (var i = startIdx; i < rows.length; i++) {
            var row = rows[i];
            if (!row || row.length === 0) continue;
            var name = String(row[0] || '').trim();
            if (!name) continue;
            var lowerName = name.toLowerCase();
            if (['nama','name','no','#','nomor','siswa','no.'].indexOf(lowerName) !== -1) continue;
            var grades = [];
            for (var j = 1; j <= TOTAL_SURAH; j++) {
                var cell = String(row[j] || '').trim().toUpperCase();
                if (cell === 'M') grades.push('M');
                else if (cell === 'J') grades.push('J');
                else grades.push('');
            }
            while (grades.length < TOTAL_SURAH) grades.push('');
            var mCount = 0, jCount = 0, emptyCount = 0;
            for (var k = 0; k < grades.length; k++) {
                if (grades[k] === 'M') mCount++;
                else if (grades[k] === 'J') jCount++;
                else emptyCount++;
            }
            var completed = mCount + jCount;
            var isComplete = emptyCount === 0;
            var isGold = isComplete && mCount === TOTAL_SURAH;
            var isSilver = isComplete && mCount < TOTAL_SURAH;
            var percent = Math.round((completed / TOTAL_SURAH) * 100);
            students.push({ name: name, grades: grades, mCount: mCount, jCount: jCount, emptyCount: emptyCount, completed: completed, isComplete: isComplete, isGold: isGold, isSilver: isSilver, percent: percent });
        }
    }

    /* ====== LOADING & ERROR ====== */
    function showLoading() {
        document.getElementById('main-content').innerHTML = '<div class="loading-screen"><div class="loader-ring"></div><p class="mt-4 text-sm" style="color:var(--muted)">Memuat data hafalan...</p></div>';
    }
    function showError(type) {
        var m = document.getElementById('main-content');
        if (type === 'file_not_found') {
            m.innerHTML = '<div class="error-screen"><div class="error-box"><i class="fas fa-file-circle-exclamation text-3xl mb-3" style="color:#E85D75"></i><h3 class="font-bold text-base mb-2">File tidak ditemukan</h3><p class="text-sm mb-4" style="color:var(--muted)">Pastikan file <code>' + XLS_FILE + '</code> ada di satu folder dengan <code>index.html</code>.</p><div class="text-left p-3 rounded-lg text-xs" style="background:var(--elevated);color:var(--muted);line-height:1.8"><div class="font-bold mb-1" style="color:var(--text)">Struktur folder:</div><div>📁 repo/<br>&nbsp;&nbsp;&nbsp;├── index.html<br>&nbsp;&nbsp;&nbsp;├── logo.png<br>&nbsp;&nbsp;&nbsp;└── ' + XLS_FILE + '</div></div></div></div>';
        } else if (type === 'empty') {
            m.innerHTML = '<div class="error-screen"><div class="error-box"><i class="fas fa-table text-3xl mb-3" style="color:var(--jayyid)"></i><h3 class="font-bold text-base mb-2">Data kosong</h3><p class="text-sm" style="color:var(--muted)">File XLS ditemukan tapi tidak ada data siswa.</p></div></div>';
        } else {
            m.innerHTML = '<div class="error-screen"><div class="error-box"><i class="fas fa-triangle-exclamation text-3xl mb-3" style="color:var(--jayyid)"></i><h3 class="font-bold text-base mb-2">Terjadi kesalahan</h3><p class="text-sm" style="color:var(--muted)">' + type + '</p></div></div>';
        }
    }

    /* ====== RENDER UTAMA ====== */
    function renderAll() {
        document.getElementById('main-content').innerHTML =
            '<section class="grid grid-cols-4 gap-2.5 px-4 -mt-4 relative z-10">' +
                '<div class="stat-card"><div class="text-xs font-semibold" style="color:var(--muted)">siswa</div><div class="text-lg font-extrabold mt-0.5" id="stat-total">0</div></div>' +
                '<div class="stat-card gold-stat"><div class="text-xs font-semibold" style="color:var(--gold)">Emas</div><div class="text-lg font-extrabold mt-0.5" style="color:var(--gold-light)" id="stat-gold">0</div></div>' +
                '<div class="stat-card silver-stat"><div class="text-xs font-semibold" style="color:var(--silver)">Perak</div><div class="text-lg font-extrabold mt-0.5" style="color:var(--silver-light)" id="stat-silver">0</div></div>' +
                '<div class="stat-card"><div class="text-xs font-semibold" style="color:var(--muted)">Progres</div><div class="text-lg font-extrabold mt-0.5" id="stat-progress">0</div></div>' +
            '</section>' +
            '<div class="search-wrap px-4 mt-5"><i class="fas fa-search search-icon"></i><input type="text" id="search-input" placeholder="Cari nama siswa..." aria-label="Cari nama siswa"></div>' +
            '<div class="flex gap-2 px-4 mt-3 overflow-x-auto pb-1" id="filter-bar" style="scrollbar-width:none">' +
                '<button class="pill active" data-filter="all">Semua</button>' +
                '<button class="pill" data-filter="gold"><i class="fas fa-medal mr-1" style="color:var(--gold)"></i>Emas</button>' +
                '<button class="pill" data-filter="silver"><i class="fas fa-medal mr-1" style="color:var(--silver)"></i>Perak</button>' +
                '<button class="pill" data-filter="progress">Belum Selesai</button>' +
            '</div>' +
            '<section class="px-4 mt-4 flex flex-col gap-3" id="student-list" role="list"></section>';
        animateStats();
        renderStudentList();
        bindEvents();
    }

    function animateStats() {
        var gc = 0, sc = 0, pc = 0;
        for (var i = 0; i < students.length; i++) {
            if (students[i].isGold) gc++;
            else if (students[i].isSilver) sc++;
            else pc++;
        }
        var pairs = [['stat-total', students.length], ['stat-gold', gc], ['stat-silver', sc], ['stat-progress', pc]];
        for (var p = 0; p < pairs.length; p++) {
            (function(pair) {
                var el = document.getElementById(pair[0]);
                var target = pair[1], cur = 0;
                var step = Math.max(1, Math.ceil(target / 15));
                var iv = setInterval(function() {
                    cur += step;
                    if (cur >= target) { cur = target; clearInterval(iv); }
                    el.textContent = cur;
                }, 40);
            })(pairs[p]);
        }
    }

    /* ====== STUDENT LIST ====== */
    function getFiltered() {
        var f = students.slice();
        if (currentFilter === 'gold') f = f.filter(function(s) { return s.isGold; });
        else if (currentFilter === 'silver') f = f.filter(function(s) { return s.isSilver; });
        else if (currentFilter === 'progress') f = f.filter(function(s) { return !s.isComplete; });
        if (searchQuery) {
            var q = searchQuery.toLowerCase();
            f = f.filter(function(s) { return s.name.toLowerCase().indexOf(q) !== -1; });
        }
        var ord = { gold: 0, silver: 1, progress: 2 };
        f.sort(function(a, b) {
            var ca = a.isGold ? 'gold' : a.isSilver ? 'silver' : 'progress';
            var cb = b.isGold ? 'gold' : b.isSilver ? 'silver' : 'progress';
            return ord[ca] !== ord[cb] ? ord[ca] - ord[cb] : b.percent - a.percent;
        });
        return f;
    }

    function renderStudentList() {
        var list = document.getElementById('student-list');
        if (!list) return;
        var filtered = getFiltered();
        if (filtered.length === 0) {
            list.innerHTML = '<div class="empty-state"><i class="fas fa-search" style="font-size:2rem;opacity:.3"></i><p class="mt-3 text-sm">Tidak ada siswa ditemukan</p></div>';
            return;
        }
        var html = '';
        for (var idx = 0; idx < filtered.length; idx++) {
            var s = filtered[idx];
            var si = students.indexOf(s);
            var parts = s.name.split(' ');
            var initials = (parts[0][0] + (parts.length > 1 ? parts[1][0] : '')).toUpperCase();
            var color = avatarColors[si % avatarColors.length];
            var barBg = 'var(--emerald)';
            if (s.isGold) barBg = 'linear-gradient(90deg,#1DB954,#2EE66A)';
            else if (s.isSilver) barBg = 'linear-gradient(90deg,#1DB954,#D4A843)';
            else if (s.percent > 50) barBg = 'linear-gradient(90deg,#1DB954,#E8A838)';
            else barBg = '#E8A838';
            var badge = '';
            if (s.isGold) badge = '<div class="gold-badge"><i class="fas fa-star"></i></div>';
            else if (s.isSilver) badge = '<div class="silver-badge"><i class="fas fa-medal"></i></div>';
            var info = '';
            if (s.isGold) {
                info = '<span class="text-xs font-semibold" style="color:var(--gold-light)">Mumtaz 100%</span>';
            } else if (s.isSilver) {
                info = '<span class="text-xs font-semibold" style="color:var(--silver-light)">Mumtaz ' + s.mCount + ' &middot; Jayyid ' + s.jCount + '</span>';
            } else {
                info = '<span class="text-xs" style="color:var(--muted)"><span style="color:var(--emerald);font-weight:700">M ' + s.mCount + '</span><span class="mx-1">&middot;</span><span style="color:var(--jayyid);font-weight:700">J ' + s.jCount + '</span><span class="mx-1">&middot;</span>Sisa ' + s.emptyCount + '</span>';
            }
            html += '<div class="student-card" role="listitem" data-index="' + si + '" style="animation-delay:' + (idx * .05) + 's" tabindex="0">' +
                '<div class="avatar" style="background:' + color + '">' + initials + '</div>' +
                '<div class="flex-1 min-w-0"><div class="font-bold text-sm truncate">' + s.name + '</div><div class="mt-0.5">' + info + '</div><div class="progress-track"><div class="progress-fill" data-width="' + s.percent + '" style="background:' + barBg + '"></div></div></div>' +
                badge + '</div>';
        }
        list.innerHTML = html;
        /* Animasi progress bar */
        requestAnimationFrame(function() {
            requestAnimationFrame(function() {
                var fills = list.querySelectorAll('.progress-fill');
                for (var i = 0; i < fills.length; i++) fills[i].style.width = fills[i].dataset.width + '%';
            });
        });
        /* Event: buka detail */
        var cards = list.querySelectorAll('.student-card');
        for (var c = 0; c < cards.length; c++) {
            (function(card) {
                var idx2 = parseInt(card.dataset.index);
                card.addEventListener('click', function() { openDetail(idx2); });
                card.addEventListener('keydown', function(e) { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openDetail(idx2); } });
            })(cards[c]);
        }
    }

    /* ====== BOTTOM SHEET ====== */
    var sheetOverlay = document.getElementById('sheet-overlay');
    var sheetEl = document.getElementById('sheet');
    var sheetBody = document.getElementById('sheet-body');

    function openDetail(index) {
        var s = students[index];
        var statusBadge;
        if (s.isGold) {
            statusBadge = '<span class="inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-bold" style="background:rgba(255,215,0,.15);color:var(--gold-light);border:1px solid rgba(255,215,0,.3)"><i class="fas fa-star"></i> Mumtaz 100%</span>';
        } else if (s.isSilver) {
            statusBadge = '<span class="inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-bold" style="background:rgba(192,192,192,.12);color:var(--silver-light);border:1px solid rgba(192,192,192,.25)"><i class="fas fa-medal"></i> Selesai</span>';
        } else {
            statusBadge = '<span class="inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-bold" style="background:rgba(232,168,56,.12);color:var(--jayyid);border:1px solid rgba(232,168,56,.25)"><i class="fas fa-spinner"></i> Dalam Progres</span>';
        }
        var gridHTML = '';
        for (var i = 0; i < s.grades.length; i++) {
            var g = s.grades[i];
            var cls = g === 'M' ? 'm-tile' : g === 'J' ? 'j-tile' : 'empty-tile';
            gridHTML += '<div class="surah-tile ' + cls + '" title="' + surahNames[i] + ': ' + (g || 'Belum') + '"><span class="tile-num">' + (i + 1) + '</span><span class="tile-grade">' + (g || '-') + '</span><span class="tile-name">' + surahNames[i] + '</span></div>';
        }
        sheetBody.innerHTML =
            '<div class="flex items-center justify-between mb-1">' +
                '<h3 class="text-lg font-extrabold">' + s.name + '</h3>' +
                '<button id="btn-close-detail" class="btn-close-sheet" aria-label="Tutup"><i class="fas fa-times text-sm"></i></button>' +
            '</div>' +
            '<div class="flex items-center gap-2 mb-1">' + statusBadge + '<span class="text-xs" style="color:var(--muted)">' + s.completed + '/' + TOTAL_SURAH + ' surah</span></div>' +
            '<div class="grid grid-cols-3 gap-3 mt-4 mb-5">' +
                '<div class="text-center p-2.5 rounded-xl" style="background:var(--tile-m-bg);border:1px solid var(--tile-m-border)"><div class="text-xl font-extrabold" style="color:var(--emerald)">' + s.mCount + '</div><div class="text-xs mt-0.5" style="color:var(--muted)">Mumtaz</div></div>' +
                '<div class="text-center p-2.5 rounded-xl" style="background:var(--tile-j-bg);border:1px solid var(--tile-j-border)"><div class="text-xl font-extrabold" style="color:var(--jayyid)">' + s.jCount + '</div><div class="text-xs mt-0.5" style="color:var(--muted)">Jayyid</div></div>' +
                '<div class="text-center p-2.5 rounded-xl" style="background:var(--tile-e-bg);border:1px solid var(--tile-e-border)"><div class="text-xl font-extrabold" style="color:var(--muted)">' + s.emptyCount + '</div><div class="text-xs mt-0.5" style="color:var(--muted)">Sisa</div></div>' +
            '</div>' +
            '<h4 class="text-xs font-bold uppercase tracking-wider mb-3" style="color:var(--muted)">Detail Per Surah</h4>' +
            '<div class="surah-grid">' + gridHTML + '</div>' +
            '<div class="flex items-center gap-4 mt-4 justify-center">' +
                '<div class="flex items-center gap-1.5"><div class="legend-dot" style="background:var(--emerald)"></div><span class="text-xs" style="color:var(--muted)">Mumtaz</span></div>' +
                '<div class="flex items-center gap-1.5"><div class="legend-dot" style="background:var(--jayyid)"></div><span class="text-xs" style="color:var(--muted)">Jayyid</span></div>' +
                '<div class="flex items-center gap-1.5"><div class="legend-dot" style="background:var(--border)"></div><span class="text-xs" style="color:var(--muted)">Belum</span></div>' +
            '</div>';

        /* Pasang event listener tombol X setelah elemen dirender */
        var closeBtn = document.getElementById('btn-close-detail');
        if (closeBtn) {
            closeBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                closeDetail();
            });
        }

        sheetOverlay.classList.add('open');
        sheetEl.classList.add('open');
        sheetOverlay.setAttribute('aria-hidden', 'false');
        document.body.style.overflow = 'hidden';
    }

    function closeDetail() {
        sheetOverlay.classList.remove('open');
        sheetEl.classList.remove('open');
        sheetOverlay.setAttribute('aria-hidden', 'true');
        document.body.style.overflow = '';
    }

    sheetOverlay.addEventListener('click', closeDetail);

    /* Swipe down tutup sheet */
    var touchStartY = 0, sheetCurrentY = 0, isDragging = false;
    sheetEl.addEventListener('touchstart', function(e) {
        if (sheetBody.scrollTop > 0) return;
        touchStartY = e.touches[0].clientY;
        isDragging = true;
        sheetEl.style.transition = 'none';
    }, { passive: true });
    sheetEl.addEventListener('touchmove', function(e) {
        if (!isDragging) return;
        var d = e.touches[0].clientY - touchStartY;
        if (d > 0) {
            sheetCurrentY = d;
            sheetEl.style.transform = 'translateX(-50%) translateY(' + sheetCurrentY + 'px)';
        }
    }, { passive: true });
    sheetEl.addEventListener('touchend', function() {
        if (!isDragging) return;
        isDragging = false;
        sheetEl.style.transition = 'transform .4s cubic-bezier(.22,1,.36,1)';
        if (sheetCurrentY > 120) closeDetail();
        else sheetEl.style.transform = 'translateX(-50%) translateY(0)';
        sheetCurrentY = 0;
    });

    /* ====== EVENT BINDINGS ====== */
    function bindEvents() {
        document.getElementById('filter-bar').addEventListener('click', function(e) {
            var pill = e.target.closest('.pill');
            if (!pill) return;
            var allPills = document.querySelectorAll('.pill');
            for (var i = 0; i < allPills.length; i++) allPills[i].classList.remove('active');
            pill.classList.add('active');
            currentFilter = pill.dataset.filter;
            renderStudentList();
        });
        var searchTimeout;
        document.getElementById('search-input').addEventListener('input', function(e) {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(function() {
                searchQuery = e.target.value.trim();
                renderStudentList();
            }, 200);
        });
    }

    document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeDetail(); });

    /* ====== JALANKAN ====== */
    init();
    </script>
</body>
</html>
